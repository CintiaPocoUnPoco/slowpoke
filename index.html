<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7c9d8" />
  <title>呆呆獸收集器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-bubble bubble-one"></div>
      <div class="hero-bubble bubble-two"></div>

      <div class="brand-row">
        <div>
          <p class="eyebrow">SLOWPOKE HUNT</p>
          <h1>呆呆獸收集器</h1>
        </div>
        <button id="settingsButton" class="icon-button" aria-label="設定">⚙️</button>
      </div>

      <div class="today-card">
        <p>今天的發呆進度</p>
        <strong><span id="todayCount">0</span> 隻</strong>
        <div class="lazy-progress" aria-hidden="true">
          <span id="progressBar"></span>
        </div>
        <small id="todayMessage">第一隻呆呆獸正在等你。</small>
      </div>
    </header>

    <section class="actions">
      <button id="openFormButton" class="primary-button">
        <span>＋</span>
        發現野生呆呆獸
      </button>
      <button id="shareButton" class="secondary-button">分享今天戰績</button>
    </section>

    <section class="section-heading">
      <div>
        <p class="eyebrow">COLLECTION</p>
        <h2>我的呆呆獸圖鑑</h2>
      </div>
      <p id="totalCount">總共 0 隻</p>
    </section>

    <section id="gallery" class="gallery"></section>

    <section id="emptyState" class="empty-state">
      <div class="empty-face">◉‿◉</div>
      <h3>圖鑑還在發呆</h3>
      <p>找到水溝蓋後，碰一下 NFC，把牠收進來。</p>
    </section>
  </main>

  <dialog id="recordDialog" class="modal">
    <form id="recordForm" method="dialog" class="modal-card">
      <button type="button" class="close-button" data-close="recordDialog" aria-label="關閉">×</button>

      <p class="eyebrow">NEW SLOWPOKE</p>
      <h2>今天找到第 <span id="nextNumber">1</span> 隻！</h2>
      <p class="modal-subtitle">拍張照，再留一句今天的呆話。</p>

      <label class="photo-picker">
        <input id="photoInput" type="file" accept="image/*" capture="environment" />
        <img id="photoPreview" alt="照片預覽" hidden />
        <span id="photoPlaceholder">
          <b>📷</b>
          拍照或選擇照片
        </span>
      </label>

      <label>
        地點
        <input id="locationInput" type="text" maxlength="60" placeholder="例如：高松車站" />
      </label>

      <label>
        今天想說的一句話
        <textarea id="messageInput" maxlength="120" rows="3" placeholder="例如：牠比我們更會等車。"></textarea>
      </label>

      <div class="form-row">
        <button type="button" id="useLocationButton" class="ghost-button">取得目前位置</button>
        <span id="locationStatus"></span>
      </div>

      <button id="saveButton" class="primary-button" type="submit">收服這隻呆呆獸</button>
      <p id="formStatus" class="status-text"></p>
    </form>
  </dialog>

  <dialog id="detailDialog" class="modal">
    <article class="modal-card detail-card">
      <button type="button" class="close-button" data-close="detailDialog" aria-label="關閉">×</button>
      <img id="detailImage" alt="" />
      <p id="detailNumber" class="eyebrow"></p>
      <h2 id="detailLocation"></h2>
      <p id="detailMessage" class="detail-message"></p>
      <p id="detailDate" class="detail-date"></p>
      <button id="deleteButton" class="danger-button">刪除這筆紀錄</button>
    </article>
  </dialog>

  <dialog id="settingsDialog" class="modal">
    <form id="settingsForm" method="dialog" class="modal-card">
      <button type="button" class="close-button" data-close="settingsDialog" aria-label="關閉">×</button>
      <p class="eyebrow">SETTINGS</p>
      <h2>雲端同步設定</h2>
      <p class="modal-subtitle">
        留白時會使用手機本機儲存。填入 Supabase 資料後，可跨裝置同步。
      </p>

      <label>
        Supabase URL
        <input id="supabaseUrlInput" type="url" placeholder="https://xxxx.supabase.co" />
      </label>

      <label>
        Supabase anon key
        <textarea id="supabaseKeyInput" rows="4" placeholder="eyJ..."></textarea>
      </label>

      <button class="primary-button" type="submit">儲存設定</button>
      <button id="clearCloudButton" class="ghost-button full-width" type="button">清除雲端設定，改用本機</button>
      <p id="settingsStatus" class="status-text"></p>
    </form>
  </dialog>

  <template id="cardTemplate">
    <button class="record-card">
      <div class="image-wrap">
        <img alt="" />
        <span class="record-number"></span>
      </div>
      <div class="card-copy">
        <h3></h3>
        <p></p>
        <small></small>
      </div>
    </button>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
</body>
</html>
