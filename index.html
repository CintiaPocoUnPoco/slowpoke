<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f7bfd5"><title>呆呆獸巡禮圖鑑</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body>
<div class="sky"><i></i><i></i><i></i><i></i></div><main><header class="hero"><div class="top"><div><small>SLOWPOKE JOURNEY</small><h1>呆呆獸巡禮圖鑑</h1></div><button id="settings">⚙️</button></div><div class="mascot"><div class="ear e1"></div><div class="ear e2"></div><div class="face"><b></b><b></b><span></span></div><div class="body"></div><em>Z</em><em>Z</em></div><section class="stats"><div>今天遇見<strong><span id="today">0</span> 隻</strong></div><div>累積收集<strong><span id="total">0</span> 隻</strong></div></section><section class="energy"><div><span>今日發呆能量</span><b id="energyText">0%</b></div><p><i id="energyBar"></i></p><small id="mood">第一隻呆呆獸正在等你。</small></section><button class="capture" id="add"><span>＋</span><b>發現野生呆呆獸<small>拍照並加入今天的圖鑑</small></b></button></header>
<section class="panel"><div class="title"><div><small>BADGES</small><h2>發呆徽章</h2></div><span id="badgeCount">0 / 4</span></div><div class="badges"><article data-goal="1">🌸<b>初次相遇</b><small>1 隻</small></article><article data-goal="3">🫧<b>發呆小隊</b><small>3 隻</small></article><article data-goal="5">👑<b>呆呆獸里長</b><small>5 隻</small></article><article data-goal="10">✨<b>發呆大師</b><small>10 隻</small></article></div></section>
<section class="panel"><div class="title"><div><small>COLLECTION</small><h2>我的旅行圖鑑</h2></div><button class="link" id="share">分享戰績</button></div><div id="gallery" class="gallery"></div><div id="empty" class="empty"><div>◉‿◉</div><h3>圖鑑還在發呆</h3><p>找到水溝蓋後，碰一下 NFC，把牠收進來。</p></div></section></main>
<dialog id="formDialog"><form id="form"><button type="button" class="close" data-close="formDialog">×</button><small>WILD SLOWPOKE</small><h2>今天找到第 <span id="next">1</span> 隻！</h2><p class="sub">拍下牠，再留一句今天的旅行小事。</p><label class="photo"><input id="photo" type="file" accept="image/*" capture="environment"><img id="preview" hidden><span id="photoText">📷<b>拍照或選擇照片</b></span></label><label>地點<input id="place" maxlength="60" placeholder="例如：高松車站"></label><label>今天想說的一句話<textarea id="note" maxlength="120" rows="3" placeholder="例如：牠比我們更會等車。"></textarea></label><button type="button" class="soft" id="geo">記錄目前位置</button><small id="geoStatus"></small><button class="primary" id="save">收服這隻呆呆獸</button><p id="status"></p></form></dialog>
<dialog id="success"><div class="success"><div>◉‿◉</div><h2>收服成功！</h2><p id="successText"></p><b>＋20 發呆能量</b></div></dialog>
<dialog id="detail"><article><button class="close" data-close="detail">×</button><img id="detailImg"><small>SLOWPOKE RECORD</small><h2 id="detailPlace"></h2><p id="detailNote"></p><time id="detailTime"></time><button class="danger" id="delete">刪除這筆紀錄</button></article></dialog>
<dialog id="settingsDialog"><form id="settingsForm"><button type="button" class="close" data-close="settingsDialog">×</button><small>SETTINGS</small><h2>雲端同步設定</h2><p class="sub">未設定時使用手機本機儲存。</p><label>Supabase URL<input id="url" type="url"></label><label>Supabase anon key<textarea id="key" rows="4"></textarea></label><button class="primary">儲存設定</button><button type="button" class="soft full" id="local">切換成本機模式</button><p id="settingsStatus"></p></form></dialog>
<template id="card"><button class="card"><div><img><span></span></div><section><h3></h3><p></p><small></small></section></button></template><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="app.js"></script></body></html>
